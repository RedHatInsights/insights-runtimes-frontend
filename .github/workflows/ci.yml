name: ci
on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: lint
        run: npm run lint
      - name: build
        run: npm run build
      - name: unit tests
        run: npm run test
